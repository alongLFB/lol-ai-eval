name: Deploy to Server

on:
  push:
    branches:
      - master # 触发的分支

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: SSH and Deploy
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}     # 服务器IP
          username: ${{ secrets.SERVER_USER }} # 服务器用户名
          key: ${{ secrets.SERVER_SSH_KEY }}   # 服务器私钥
          port: ${{ secrets.SERVER_PORT || 22 }}
          script: |
            mkdir -p ~/github
            cd ~/github
            if [ ! -d "lol-ai-eval" ]; then
              git clone git@github.com:alongLFB/lol-ai-eval.git
            fi
            cd lol-ai-eval
            git pull origin master
            export NVM_DIR="$HOME/.nvm"
            [ -s "$NVM_DIR/nvm.sh" ] && \. "$NVM_DIR/nvm.sh"
            npm ci
            npm run build
            pm2 restart lol-ai-eval || pm2 start npm --name "lol-ai-eval" -- start
